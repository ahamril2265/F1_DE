version: "3.9"

services:

  db:
    image: postgres:15
    container_name: f1_postgres
    restart: always
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: f1_pipeline
    depends_on:
      - db
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../cache:/app/cache
    command: ["python", "main.py"]

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: f1_dashboard
    depends_on:
      - db
    env_file:
      - ../.env
    ports:
      - "8050:8050"
    volumes:
      - ../data:/app/data
    command: ["python", "dashboard/app.py"]

volumes:
  postgres_data: